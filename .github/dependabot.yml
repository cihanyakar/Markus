version: 2
updates:
  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    commit-message:
      prefix: chore
      include: scope
    labels:
      - dependencies
      - nuget
    groups:
      avalonia:
        patterns:
          - "Avalonia*"
      analyzers:
        patterns:
          - "StyleCop.Analyzers"
          - "Meziantou.Analyzer"
          - "SonarAnalyzer.*"
          - "Roslynator.*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: ci
      include: scope
    labels:
      - dependencies
      - github-actions
