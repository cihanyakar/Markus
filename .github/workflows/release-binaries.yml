name: Release binaries

on:
  release:
    types: [published]
  # Called from release-please.yml in the same run when release-please
  # creates a release. A release published by the GITHUB_TOKEN does not
  # emit a `release` event that can trigger this workflow (GitHub's
  # recursion guard), so the publisher chains the build here instead.
  workflow_call:
    inputs:
      tag:
        description: Tag to build binaries for (e.g. v0.9.3)
        required: true
        type: string
  # Manual rebuild for a given tag (e.g. when a release was created by a
  # bot and its binaries never built).
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to build binaries for (e.g. v0.9.3)
        required: true
        type: string

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  HUSKY: 0

permissions:
  contents: write

concurrency:
  group: release-binaries-${{ inputs.tag || github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  build:
    name: Publish ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    # Single source of truth for the tag across triggers: the release event
    # supplies it via the payload, workflow_call/dispatch via the input.
    env:
      TAG: ${{ inputs.tag || github.event.release.tag_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            os: windows-latest
            bundle: zip
          - rid: osx-arm64
            os: macos-latest
            bundle: app
          - rid: linux-x64
            os: ubuntu-latest
            bundle: tar

    steps:
      - name: Checkout (tag, full history for MinVer)
        uses: actions/checkout@v7
        with:
          ref: ${{ env.TAG }}
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      # NativeAOT needs a C toolchain to link. macOS (Xcode) and Windows (MSVC)
      # runners already have one; Linux needs clang and zlib headers.
      - name: Install NativeAOT toolchain (Linux)
        if: matrix.rid == 'linux-x64'
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      - name: Restore
        run: dotnet restore src/Markus/Markus.csproj -r ${{ matrix.rid }}

      # NativeAOT for every platform. AOT removes the JIT warmup that dominated
      # cold start (window-shown ~750ms on the old JIT single-file build vs
      # ~170ms on AOT in local measurement), and the SVG (mermaid) and CSharpMath
      # render paths were verified to work under AOT. Each RID compiles natively
      # on its own runner, so there is no cross-compilation. The %3B keeps the
      # NoWarn list a single MSBuild property across shells.
      # A command-line -p:NoWarn is a global property that fully replaces the
      # <NoWarn> in Directory.Build.props (it does not append), so AD0001 and
      # CS1591 must be repeated here or the StyleCop record-struct crash (AD0001)
      # resurfaces as a hard error and fails the AOT publish on CI's newer SDK.
      - name: Publish NativeAOT
        shell: bash
        run: |
          dotnet publish src/Markus/Markus.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            -p:PublishAot=true \
            -p:InvariantGlobalization=true \
            -p:NoWarn=IL2104%3BIL2026%3BIL3050%3BAD0001%3BCS1591 \
            -o publish/${{ matrix.rid }}

      # --- macOS: build a proper .app bundle ---
      - name: Build .app bundle (macOS)
        if: matrix.bundle == 'app'
        shell: bash
        run: |
          VERSION="${TAG#v}"
          YEAR=$(date -u +%Y)
          APP_DIR="Markus.app"
          mkdir -p "$APP_DIR/Contents/MacOS"
          mkdir -p "$APP_DIR/Contents/Resources"

          # Copy all published files into the .app's MacOS dir
          cp -R "publish/${{ matrix.rid }}/." "$APP_DIR/Contents/MacOS/"
          chmod +x "$APP_DIR/Contents/MacOS/Markus"

          # Render Info.plist from the template
          sed \
            -e "s/__VERSION__/$VERSION/g" \
            -e "s/__YEAR__/$YEAR/g" \
            src/Markus/Build/Info.plist.template > "$APP_DIR/Contents/Info.plist"

          # Optional icon (if shipped)
          if [ -f "src/Markus/Build/Markus.icns" ]; then
            cp src/Markus/Build/Markus.icns "$APP_DIR/Contents/Resources/"
            /usr/libexec/PlistBuddy -c "Add :CFBundleIconFile string Markus.icns" "$APP_DIR/Contents/Info.plist" || true
          fi

          # Quarantine attribute that GitHub-downloaded files get is applied
          # client-side; we cannot strip it here. Users right-click → Open
          # the first time on macOS Gatekeeper.

      - name: Ad-hoc sign bundle (macOS)
        if: matrix.bundle == 'app'
        shell: bash
        run: |
          APP_DIR="Markus.app"
          # Sign each Mach-O inside individually so library validation
          # accepts the sibling dylibs at load time. Without this, the
          # bundle-wide --deep pass alone leaves dylibs with the linker's
          # original automatic ad-hoc signature, which Gatekeeper rejects
          # on machines other than the build host.
          find "$APP_DIR/Contents/MacOS" -name '*.dylib' -exec codesign --sign - --force {} \;
          # Seal the bundle without hardened runtime: --options=runtime
          # would require notarized or team-id-signed dylibs and reject
          # ad-hoc-signed ones, causing SkiaPlatform's static initializer
          # to abort on first launch.
          codesign --sign - --deep --force "$APP_DIR"
          codesign --verify --verbose=2 "$APP_DIR" 2>&1 | tail -5

      - name: Archive macOS .app (dmg)
        if: matrix.bundle == 'app'
        shell: bash
        env:
          ARCHIVE_NAME: Markus-${{ env.TAG }}-${{ matrix.rid }}.dmg
        run: |
          # Stage the bundle alongside an /Applications symlink so the DMG
          # opens with a "drag here" install layout familiar from any
          # commercial Mac app.
          rm -rf dmg-staging
          mkdir dmg-staging
          cp -R Markus.app dmg-staging/
          ln -s /Applications dmg-staging/Applications

          hdiutil create \
            -volname "Markus" \
            -srcfolder dmg-staging \
            -ov \
            -format UDZO \
            -fs HFS+ \
            "$ARCHIVE_NAME"

          # Ad-hoc sign the DMG too so Gatekeeper at least sees a consistent
          # signature on the container even though .app inside is what matters.
          codesign --sign - --force "$ARCHIVE_NAME"
          echo "ARTIFACT=$ARCHIVE_NAME" >> "$GITHUB_ENV"

      # --- Linux: plain tar.gz ---
      - name: Archive (tar.gz)
        if: matrix.bundle == 'tar'
        shell: bash
        env:
          ARCHIVE_NAME: Markus-${{ env.TAG }}-${{ matrix.rid }}.tar.gz
        run: |
          tar -czf "$ARCHIVE_NAME" -C "publish/${{ matrix.rid }}" .
          echo "ARTIFACT=$ARCHIVE_NAME" >> "$GITHUB_ENV"

      # --- Windows: zip ---
      - name: Archive (zip)
        if: matrix.bundle == 'zip'
        shell: pwsh
        env:
          ARCHIVE_NAME: Markus-${{ env.TAG }}-${{ matrix.rid }}.zip
        run: |
          Compress-Archive -Path "publish/${{ matrix.rid }}/*" -DestinationPath "$env:ARCHIVE_NAME"
          "ARTIFACT=$env:ARCHIVE_NAME" >> $env:GITHUB_ENV

      # --- SHA256 ---
      - name: Compute SHA256 (Linux/macOS)
        if: matrix.bundle != 'zip'
        shell: bash
        env:
          ART: ${{ env.ARTIFACT }}
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            shasum -a 256 "$ART" > "$ART.sha256"
          else
            sha256sum "$ART" > "$ART.sha256"
          fi

      - name: Compute SHA256 (Windows)
        if: matrix.bundle == 'zip'
        shell: pwsh
        env:
          ART: ${{ env.ARTIFACT }}
        run: |
          $h = Get-FileHash -Path $env:ART -Algorithm SHA256
          "$($h.Hash.ToLower())  $env:ART" | Out-File -Encoding ASCII "$env:ART.sha256"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.TAG }}
          files: |
            ${{ env.ARTIFACT }}
            ${{ env.ARTIFACT }}.sha256
